[variables]
# Build phase usa settings.build (sin secrets de Railway)
DJANGO_SETTINGS_MODULE = "config.settings.build"

[deploy]
# En runtime sobreescribimos DJANGO_SETTINGS_MODULE con production
startCommand = "DJANGO_SETTINGS_MODULE=config.settings.production python manage.py collectstatic --noinput && DJANGO_SETTINGS_MODULE=config.settings.production python manage.py migrate --noinput && DJANGO_SETTINGS_MODULE=config.settings.production python seed.py && DJANGO_SETTINGS_MODULE=config.settings.production gunicorn config.wsgi:application --bind 0.0.0.0:${PORT:-8080} --workers 2 --timeout 120"
