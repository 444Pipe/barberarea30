[variables]
DJANGO_SETTINGS_MODULE = "config.settings.production"
EMAIL_HOST            = "smtp.hostinger.com"
EMAIL_PORT            = "587"
EMAIL_USE_TLS         = "True"
EMAIL_HOST_USER       = ""
EMAIL_HOST_PASSWORD   = ""
EMAIL_FROM            = "Area 30 Barber Club <area30barberclub@area30barberclub.com>"
EMAIL_ADMIN           = ""
SECRET_KEY            = "build-time-placeholder-overridden-at-runtime"
ALLOWED_HOSTS         = "localhost,127.0.0.1"
CSRF_TRUSTED_ORIGINS  = "http://localhost:8000"
SITE_URL              = "https://www.area30barberclub.com"

[deploy]
startCommand = "python manage.py collectstatic --noinput && python manage.py migrate --noinput && python seed.py && gunicorn config.wsgi:application --bind 0.0.0.0:${PORT:-8080} --workers 2 --timeout 120"
