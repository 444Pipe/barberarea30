<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login Admin – Barber Freestyle</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; }
    .font-bebas { font-family: 'Bebas Neue', cursive; }
    .font-rajdhani { font-family: 'Rajdhani', sans-serif; }
  </style>
</head>
<body class="min-h-screen bg-black flex items-center justify-center">
  <div class="w-full max-w-sm bg-zinc-900 border border-zinc-800 rounded-2xl p-8 shadow-xl">
    <div class="flex items-center gap-3 mb-6 justify-center">
      <div class="w-10 h-10 rounded-full bg-zinc-950 flex items-center justify-center border border-blue-500">
        <span class="font-bebas text-lg tracking-widest text-white">BF</span>
      </div>
      <div class="font-bebas text-xl tracking-widest text-white">BARBER<span class="text-amber-500">FREESTYLE</span></div>
    </div>
    <h1 class="font-rajdhani text-sm tracking-[0.25em] uppercase text-zinc-400 mb-4 text-center">Panel Administrativo</h1>

    {% if error %}
      <div class="mb-4 text-sm text-red-400 bg-red-950/40 border border-red-600/60 rounded-lg px-3 py-2">
        {{ error }}
      </div>
    {% endif %}

    <form method="post" class="space-y-4">
      <div>
        <label class="block text-xs font-rajdhani tracking-[0.2em] uppercase text-zinc-400 mb-1">Usuario</label>
        <input type="text" name="username" class="w-full px-3 py-2 rounded-lg bg-zinc-900 border border-zinc-700 text-white text-sm focus:outline-none focus:border-amber-500" required>
      </div>
      <div>
        <label class="block text-xs font-rajdhani tracking-[0.2em] uppercase text-zinc-400 mb-1">Contraseña</label>
        <div class="relative">
          <input type="password" name="password" id="passwordInput" class="w-full px-3 py-2 pr-10 rounded-lg bg-zinc-900 border border-zinc-700 text-white text-sm focus:outline-none focus:border-amber-500" required>
          <button type="button" id="togglePassword" class="absolute inset-y-0 right-0 flex items-center pr-3 text-zinc-400 hover:text-amber-500 transition-colors">
            <svg id="eyeIcon" xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
            </svg>
            <svg id="eyeOffIcon" xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.542-7a9.97 9.97 0 012.293-3.95m3.249-2.383A9.956 9.956 0 0112 5c4.478 0 8.268 2.943 9.542 7a9.965 9.965 0 01-4.043 5.197M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 3l18 18"/>
            </svg>
          </button>
        </div>
      </div>
      <button type="submit" class="w-full mt-4 bg-amber-600 hover:bg-amber-700 text-white text-sm font-rajdhani tracking-[0.25em] uppercase py-2.5 rounded-lg transition-colors">Entrar</button>
    </form>
  </div>
  <script>
    const toggle = document.getElementById('togglePassword');
    const input = document.getElementById('passwordInput');
    const eyeIcon = document.getElementById('eyeIcon');
    const eyeOffIcon = document.getElementById('eyeOffIcon');
    toggle.addEventListener('click', () => {
      const visible = input.type === 'text';
      input.type = visible ? 'password' : 'text';
      eyeIcon.classList.toggle('hidden', !visible);
      eyeOffIcon.classList.toggle('hidden', visible);
    });
  </script>
</body>
</html>
