{% extends "admin/base_admin.html" %}
{% block title %}Mi Agenda{% endblock %}

{% block extra_head %}
<link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/main.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.js"></script>
{% endblock %}

{% block content %}
<div class="space-y-6">
  <div>
    <h1 class="text-2xl font-serif font-bold text-white tracking-wider">Mi Agenda</h1>
    <p class="text-xs text-smoke/40 mt-1 tracking-wider uppercase">Tus citas programadas</p>
  </div>

  <div class="bg-jet-card border border-white/5 rounded-xl p-4 lg:p-6">
    <div id="barber-calendar" class="text-xs"></div>
  </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
  const params = new URLSearchParams(window.location.search);
  const barberId = params.get('barber') || '';
  const url = barberId ? `/api/admin/bookings/?barber=${barberId}` : '/api/admin/bookings/';

  fetch(url)
    .then(r => r.json())
    .then(bookings => {
      const events = bookings.map(b => ({
        title: `${b.client_name} — ${b.service_name || ''}`,
        start: `${b.date}T${b.time}`,
        backgroundColor: b.barber_color || '#D4AF37',
        borderColor: b.barber_color || '#D4AF37',
        textColor: '#0a0a0a',
      }));

      const cal = new FullCalendar.Calendar(document.getElementById('barber-calendar'), {
        initialView: window.innerWidth < 640 ? 'listWeek' : 'timeGridWeek',
        height: 600,
        locale: 'es',
        headerToolbar: {
          left: 'prev,next today',
          center: 'title',
          right: 'timeGridWeek,timeGridDay,listWeek'
        },
        events: events,
        slotMinTime: '08:00:00',
        slotMaxTime: '21:00:00',
      });
      cal.render();
    });
});
</script>
{% endblock %}
