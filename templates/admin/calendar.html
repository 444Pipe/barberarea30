{% extends "admin/base_admin.html" %}
{% block title %}Calendario{% endblock %}

{% block extra_head %}
<link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/main.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.js"></script>
{% endblock %}

{% block content %}
<div class="space-y-6">
  <div class="flex items-center justify-between">
    <div>
      <h1 class="text-2xl font-serif font-bold text-white tracking-wider">Calendario</h1>
      <p class="text-xs text-smoke/40 mt-1 tracking-wider uppercase">Vista de todas las reservas</p>
    </div>
  </div>

  <!-- Barber Filter -->
  <div class="bg-jet-card border border-white/5 rounded-xl p-4">
    <div class="text-[0.65rem] tracking-widest uppercase text-smoke/40 font-semibold mb-3">Filtrar por Barbero</div>
    <div id="barber-filters" class="flex flex-wrap gap-2">
      <label class="barber-filter-chip active" data-barber="all">
        <input type="checkbox" checked class="hidden"> Todos
      </label>
    </div>
  </div>

  <!-- Calendar Container -->
  <div class="bg-jet-card border border-white/5 rounded-xl p-4 lg:p-6">
    <div id="admin-calendar" class="text-xs"></div>
  </div>

  <!-- Booking Detail Modal -->
  <div id="booking-modal" class="fixed inset-0 bg-black/80 flex items-center justify-center z-50 hidden">
    <div class="bg-jet-card border border-white/5 rounded-xl w-full max-w-lg mx-4 shadow-2xl">
      <div class="flex items-center justify-between px-6 py-4 border-b border-white/5">
        <div>
          <h3 class="text-sm tracking-[0.2em] uppercase text-smoke/50 font-semibold">Detalle de Reserva</h3>
          <p id="modal-id" class="text-[0.6rem] text-smoke/30"></p>
        </div>
        <button onclick="closeModal()" class="text-smoke/40 hover:text-white transition-colors">✕</button>
      </div>
      <div class="px-6 py-5 space-y-3 text-sm">
        <div class="flex justify-between"><span class="text-smoke/50">Cliente</span><span id="modal-client" class="text-white"></span></div>
        <div class="flex justify-between"><span class="text-smoke/50">Teléfono</span><span id="modal-phone" class="text-white"></span></div>
        <div class="flex justify-between"><span class="text-smoke/50">Servicio</span><span id="modal-service" class="text-white"></span></div>
        <div class="flex justify-between"><span class="text-smoke/50">Barbero</span><span id="modal-barber" class="text-gold"></span></div>
        <div class="flex justify-between"><span class="text-smoke/50">Fecha</span><span id="modal-date" class="text-white"></span></div>
        <div class="flex justify-between"><span class="text-smoke/50">Hora</span><span id="modal-time" class="text-white"></span></div>
        <div class="flex justify-between"><span class="text-smoke/50">Precio</span><span id="modal-price" class="text-emerald-400 font-semibold"></span></div>
        <div class="flex justify-between"><span class="text-smoke/50">Estado</span><span id="modal-status"></span></div>
      </div>
      <div class="px-6 py-4 border-t border-white/5 flex flex-wrap gap-2">
        <button id="modal-btn-confirm" onclick="updateBookingStatus('confirmed')" class="px-4 py-2 rounded-md bg-blue-600/80 hover:bg-blue-600 text-white text-xs tracking-wider uppercase transition-colors">Confirmar</button>
        <button id="modal-btn-complete" onclick="updateBookingStatus('completed')" class="px-4 py-2 rounded-md bg-emerald-600/80 hover:bg-emerald-600 text-white text-xs tracking-wider uppercase transition-colors">Completar</button>
        <button id="modal-btn-cancel" onclick="updateBookingStatus('cancelled')" class="px-4 py-2 rounded-md bg-red-600/80 hover:bg-red-600 text-white text-xs tracking-wider uppercase transition-colors">Cancelar</button>
        <button onclick="closeModal()" class="ml-auto px-4 py-2 rounded-md bg-jet border border-white/10 text-smoke/60 text-xs tracking-wider uppercase hover:text-white transition-colors">Cerrar</button>
      </div>
    </div>
  </div>
</div>

<script>
let calendar = null;
let allEvents = [];
let currentBookingId = null;

document.addEventListener('DOMContentLoaded', function() {
  // Load barbers for filter
  fetch('/api/barbers/')
    .then(r => r.json())
    .then(barbers => {
      const container = document.getElementById('barber-filters');
      barbers.forEach(b => {
        const label = document.createElement('label');
        label.className = 'barber-filter-chip active';
        label.dataset.barber = b.id;
        label.style.setProperty('--chip-color', b.color_tag);
        label.innerHTML = `<input type="checkbox" checked class="hidden">
          <span class="w-2 h-2 rounded-full inline-block mr-1" style="background: ${b.color_tag}"></span>${b.display_name}`;
        label.addEventListener('click', () => {
          label.classList.toggle('active');
          filterCalendar();
        });
        container.appendChild(label);
      });
    });

  // Load bookings and init calendar
  fetch('/api/admin/bookings/')
    .then(r => r.json())
    .then(bookings => {
      allEvents = bookings.map(b => ({
        id: String(b.id),
        title: `${b.client_name} — ${b.service_name || ''}`,
        start: `${b.date}T${b.time}`,
        backgroundColor: b.barber_color || '#D4AF37',
        borderColor: b.barber_color || '#D4AF37',
        textColor: '#0a0a0a',
        extendedProps: b,
      }));
      initCalendar();
    });
});

function initCalendar() {
  const calendarEl = document.getElementById('admin-calendar');
  const isMobile = window.innerWidth < 640;

  calendar = new FullCalendar.Calendar(calendarEl, {
    initialView: isMobile ? 'listWeek' : 'dayGridMonth',
    height: isMobile ? 'auto' : 600,
    locale: 'es',
    headerToolbar: {
      left: isMobile ? 'prev,next' : 'prev,next today',
      center: 'title',
      right: isMobile ? '' : 'dayGridMonth,timeGridWeek,timeGridDay,listWeek'
    },
    events: allEvents,
    editable: true,
    eventClick: function(info) {
      info.jsEvent.preventDefault();
      openModal(info.event.extendedProps);
    },
    eventDrop: function(info) {
      const props = info.event.extendedProps;
      const newDate = info.event.start.toISOString().split('T')[0];
      const newTime = info.event.start.toTimeString().substring(0, 5);
      fetch(`/api/admin/bookings/${props.id}/`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json', 'X-CSRFToken': getCSRF() },
        body: JSON.stringify({ date: newDate, time: newTime })
      }).then(r => {
        if (!r.ok) { info.revert(); }
      }).catch(() => info.revert());
    },
  });
  calendar.render();
}

function filterCalendar() {
  if (!calendar) return;
  const active = [...document.querySelectorAll('.barber-filter-chip.active')].map(c => c.dataset.barber);
  const showAll = active.includes('all');

  calendar.removeAllEvents();
  const filtered = showAll ? allEvents : allEvents.filter(e => active.includes(String(e.extendedProps.barber)));
  filtered.forEach(e => calendar.addEvent(e));
}

function openModal(data) {
  currentBookingId = data.id;
  document.getElementById('modal-id').textContent = `Reserva #${data.id}`;
  document.getElementById('modal-client').textContent = data.client_name;
  document.getElementById('modal-phone').textContent = data.client_phone;
  document.getElementById('modal-service').textContent = data.service_name || '';
  document.getElementById('modal-barber').textContent = data.barber_name || '';
  document.getElementById('modal-date').textContent = data.date;
  document.getElementById('modal-time').textContent = data.time;
  document.getElementById('modal-price').textContent = '$' + (data.price || 0).toLocaleString('es-CO');
  document.getElementById('modal-status').textContent = data.status;
  document.getElementById('booking-modal').classList.remove('hidden');
}

function closeModal() {
  document.getElementById('booking-modal').classList.add('hidden');
  currentBookingId = null;
}

function updateBookingStatus(newStatus) {
  if (!currentBookingId) return;
  fetch(`/api/admin/bookings/${currentBookingId}/`, {
    method: 'PATCH',
    headers: { 'Content-Type': 'application/json', 'X-CSRFToken': getCSRF() },
    body: JSON.stringify({ status: newStatus })
  }).then(r => r.json()).then(() => {
    closeModal();
    location.reload();
  });
}

function getCSRF() {
  const cookie = document.cookie.split(';').find(c => c.trim().startsWith('csrftoken='));
  return cookie ? cookie.split('=')[1] : '';
}
</script>
{% endblock %}
