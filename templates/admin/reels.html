{% extends "admin/base_admin.html" %}
{% block title %}Reels{% endblock %}

{% block content %}
<div class="space-y-6">
  <div class="flex items-center justify-between">
    <div>
      <h1 class="text-2xl font-serif font-bold text-white tracking-wider">Reels</h1>
      <p class="text-xs text-smoke/40 mt-1 tracking-wider uppercase">Videos para la página pública</p>
    </div>
    <div class="flex gap-2">
      <a href="/reels/" target="_blank" class="px-4 py-2 rounded-md bg-jet border border-white/10 text-smoke/60 text-xs tracking-wider uppercase hover:text-gold hover:border-gold/30 transition-all flex items-center gap-2">
        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"/></svg>
        Ver página
      </a>
      <button onclick="openUploadModal()" class="px-5 py-2.5 rounded-md bg-gradient-to-r from-gold-dark to-gold text-jet text-xs tracking-widest uppercase font-bold hover:shadow-lg hover:shadow-gold/20 transition-all">
        + Subir Reel
      </button>
    </div>
  </div>

  <!-- Grid de Reels -->
  <div id="reels-grid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-4">
    <div class="col-span-full text-center text-smoke/30 text-sm py-12">Cargando reels...</div>
  </div>
</div>

<!-- Modal subir reel -->
<div id="upload-modal" class="fixed inset-0 bg-black/80 flex items-center justify-center z-50 hidden">
  <div class="bg-jet-card border border-white/5 rounded-xl w-full max-w-lg mx-4 shadow-2xl max-h-[90vh] overflow-y-auto">
    <div class="flex items-center justify-between px-6 py-4 border-b border-white/5">
      <h3 id="modal-title" class="text-sm tracking-[0.2em] uppercase text-smoke/50 font-semibold">Subir Reel</h3>
      <button onclick="closeUploadModal()" class="text-smoke/40 hover:text-white">✕</button>
    </div>
    <form id="reel-form" class="px-6 py-5 space-y-4">
      <input type="hidden" id="reel-id">

      <!-- Video preview -->
      <div id="video-drop-zone" class="border-2 border-dashed border-white/10 rounded-lg p-8 text-center cursor-pointer hover:border-gold/30 transition-colors" onclick="document.getElementById('video-input').click()">
        <video id="video-preview" class="hidden w-full max-h-48 rounded-lg mb-3 object-contain" controls></video>
        <div id="video-placeholder">
          <svg class="w-10 h-10 mx-auto mb-3 text-smoke/20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15 10l4.553-2.069A1 1 0 0121 8.87v6.26a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z"/></svg>
          <p class="text-smoke/40 text-xs">Haz clic para subir un video MP4</p>
          <p class="text-smoke/20 text-[0.6rem] mt-1">Vertical 9:16 recomendado · Máx 50MB</p>
        </div>
        <input type="file" id="video-input" accept="video/mp4,video/webm,video/mov" class="hidden" onchange="previewVideo(this)">
      </div>

      <!-- Thumbnail -->
      <div>
        <label class="admin-label">Miniatura (opcional)</label>
        <div class="flex items-center gap-3">
          <img id="thumb-preview" src="" alt="" class="hidden w-16 h-24 object-cover rounded border border-white/10">
          <button type="button" onclick="document.getElementById('thumb-input').click()" class="px-4 py-2 bg-jet border border-white/10 rounded text-xs text-smoke/60 hover:text-gold hover:border-gold/30 transition-all">
            Subir miniatura
          </button>
          <input type="file" id="thumb-input" accept="image/*" class="hidden" onchange="previewThumb(this)">
        </div>
      </div>

      <div>
        <label class="admin-label">Título</label>
        <input type="text" id="reel-title" class="admin-input" placeholder="Ej: Fade perfecto — El CEO Cut">
      </div>
      <div>
        <label class="admin-label">Descripción (opcional)</label>
        <textarea id="reel-description" rows="2" class="admin-input" placeholder="Breve descripción del trabajo..."></textarea>
      </div>
      <div class="grid grid-cols-2 gap-4">
        <div>
          <label class="admin-label">Barbero</label>
          <select id="reel-barber" class="admin-select">
            <option value="">Sin asignar</option>
            {% for b in barbers %}
            <option value="{{ b.id }}">{{ b.display_name }}</option>
            {% endfor %}
          </select>
        </div>
        <div>
          <label class="admin-label">Orden</label>
          <input type="number" id="reel-order" class="admin-input" value="0" min="0">
        </div>
      </div>
      <div class="flex items-center gap-3">
        <input type="checkbox" id="reel-active" checked class="accent-gold w-4 h-4">
        <label for="reel-active" class="text-xs text-smoke/60">Visible en página pública</label>
      </div>
      <div class="flex gap-2 pt-2">
        <button type="submit" id="reel-submit-btn" class="flex-1 py-2.5 rounded-md bg-gradient-to-r from-gold-dark to-gold text-jet text-xs tracking-widest uppercase font-bold">Guardar</button>
        <button type="button" onclick="closeUploadModal()" class="px-6 py-2.5 rounded-md bg-jet border border-white/10 text-smoke/60 text-xs tracking-wider uppercase">Cancelar</button>
      </div>
    </form>
  </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', loadReels);

function loadReels() {
  fetch('/api/admin/reels/')
    .then(r => r.json())
    .then(renderReels)
    .catch(() => {
      document.getElementById('reels-grid').innerHTML = '<div class="col-span-full text-center text-smoke/30 text-sm py-12">Error al cargar reels</div>';
    });
}

function renderReels(reels) {
  const grid = document.getElementById('reels-grid');
  if (!reels.length) {
    grid.innerHTML = '<div class="col-span-full text-center py-16"><div class="text-smoke/20 text-sm mb-2">🎬 No hay reels subidos</div><p class="text-smoke/30 text-xs">Haz clic en "+ Subir Reel" para comenzar</p></div>';
    return;
  }
  grid.innerHTML = reels.map(r => `
    <div class="group relative bg-jet border border-white/5 rounded-xl overflow-hidden hover:border-gold/20 transition-all">
      <!-- Video thumbnail / preview -->
      <div class="relative aspect-[9/16] bg-jet-lighter">
        ${r.thumbnail
          ? `<img src="${r.thumbnail}" class="w-full h-full object-cover" alt="${r.title || 'Reel'}">`
          : `<video src="${r.video}" class="w-full h-full object-cover" preload="metadata" muted playsinline
               onmouseenter="this.play()" onmouseleave="this.pause();this.currentTime=0"></video>`
        }
        <!-- Overlay con controles -->
        <div class="absolute inset-0 bg-gradient-to-t from-black/80 via-transparent to-transparent opacity-0 group-hover:opacity-100 transition-opacity flex flex-col justify-between p-3">
          <div class="flex justify-end gap-1">
            <button onclick="toggleActive(${r.id}, ${!r.is_active})" class="w-7 h-7 rounded-full ${r.is_active ? 'bg-emerald-500/80' : 'bg-smoke/20'} flex items-center justify-center" title="${r.is_active ? 'Activo' : 'Inactivo'}">
              <svg class="w-3.5 h-3.5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
            </button>
            <button onclick="editReel(${r.id})" class="w-7 h-7 rounded-full bg-gold/80 flex items-center justify-center">
              <svg class="w-3.5 h-3.5 text-jet" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/></svg>
            </button>
            <button onclick="deleteReel(${r.id}, '${(r.title||'este reel').replace(/'/g,"\\'")}')" class="w-7 h-7 rounded-full bg-red-500/80 flex items-center justify-center">
              <svg class="w-3.5 h-3.5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
            </button>
          </div>
          <div>
            ${r.title ? `<p class="text-gold text-xs font-semibold truncate">${r.title}</p>` : ''}
            ${r.barber_name ? `<p class="text-smoke/60 text-[0.6rem]">Por: ${r.barber_name}</p>` : ''}
          </div>
        </div>
        <!-- Badge estado -->
        <div class="absolute top-2 left-2">
          <span class="px-1.5 py-0.5 rounded text-[0.55rem] font-bold tracking-wider ${r.is_active ? 'bg-emerald-500/20 text-emerald-400' : 'bg-red-500/20 text-red-400'}">
            ${r.is_active ? 'ACTIVO' : 'OCULTO'}
          </span>
        </div>
      </div>
    </div>
  `).join('');
}

function previewVideo(input) {
  const file = input.files[0];
  if (!file) return;
  const url = URL.createObjectURL(file);
  const video = document.getElementById('video-preview');
  video.src = url;
  video.classList.remove('hidden');
  document.getElementById('video-placeholder').classList.add('hidden');
}

function previewThumb(input) {
  const file = input.files[0];
  if (!file) return;
  const url = URL.createObjectURL(file);
  const img = document.getElementById('thumb-preview');
  img.src = url;
  img.classList.remove('hidden');
}

function openUploadModal() {
  document.getElementById('modal-title').textContent = 'Subir Reel';
  document.getElementById('reel-form').reset();
  document.getElementById('reel-id').value = '';
  document.getElementById('video-preview').classList.add('hidden');
  document.getElementById('video-placeholder').classList.remove('hidden');
  document.getElementById('thumb-preview').classList.add('hidden');
  document.getElementById('reel-active').checked = true;
  document.getElementById('upload-modal').classList.remove('hidden');
}

function closeUploadModal() {
  document.getElementById('upload-modal').classList.add('hidden');
}

function editReel(id) {
  fetch(`/api/admin/reels/${id}/`)
    .then(r => r.json())
    .then(reel => {
      document.getElementById('modal-title').textContent = 'Editar Reel';
      document.getElementById('reel-id').value = reel.id;
      document.getElementById('reel-title').value = reel.title || '';
      document.getElementById('reel-description').value = reel.description || '';
      document.getElementById('reel-barber').value = reel.barber || '';
      document.getElementById('reel-order').value = reel.display_order || 0;
      document.getElementById('reel-active').checked = reel.is_active;
      // Show current video / thumb
      const video = document.getElementById('video-preview');
      video.src = reel.video;
      video.classList.remove('hidden');
      document.getElementById('video-placeholder').classList.add('hidden');
      if (reel.thumbnail) {
        const img = document.getElementById('thumb-preview');
        img.src = reel.thumbnail;
        img.classList.remove('hidden');
      }
      document.getElementById('upload-modal').classList.remove('hidden');
    });
}

function toggleActive(id, newState) {
  fetch(`/api/admin/reels/${id}/`, {
    method: 'PATCH',
    headers: { 'Content-Type': 'application/json', 'X-CSRFToken': getCSRF() },
    body: JSON.stringify({ is_active: newState })
  }).then(res => {
    if (!res.ok) { alert('No se pudo actualizar el estado del reel.'); return; }
    loadReels();
  }).catch(() => alert('No se pudo actualizar el estado del reel.'));
}

function deleteReel(id, name) {
  if (!confirm(`¿Eliminar "${name}"? Esta acción no se puede deshacer.`)) return;
  fetch(`/api/admin/reels/${id}/`, {
    method: 'DELETE',
    headers: { 'X-CSRFToken': getCSRF() }
  }).then(r => { if (r.ok || r.status === 204) loadReels(); });
}

document.getElementById('reel-form').addEventListener('submit', function(e) {
  e.preventDefault();
  const btn = document.getElementById('reel-submit-btn');
  const id = document.getElementById('reel-id').value;
  const isEdit = !!id;

  const formData = new FormData();
  formData.append('title', document.getElementById('reel-title').value);
  formData.append('description', document.getElementById('reel-description').value);
  formData.append('barber', document.getElementById('reel-barber').value);
  formData.append('display_order', document.getElementById('reel-order').value);
  formData.append('is_active', document.getElementById('reel-active').checked);

  const videoFile = document.getElementById('video-input').files[0];
  if (videoFile) formData.append('video', videoFile);

  const thumbFile = document.getElementById('thumb-input').files[0];
  if (thumbFile) formData.append('thumbnail', thumbFile);

  if (!isEdit && !videoFile) { alert('Debes seleccionar un video.'); return; }

  const url = isEdit ? `/api/admin/reels/${id}/` : '/api/admin/reels/';
  const method = isEdit ? 'PATCH' : 'POST';

  btn.disabled = true;
  btn.textContent = 'Guardando...';

  fetch(url, {
    method,
    headers: { 'X-CSRFToken': getCSRF() },
    body: formData
  })
  .then(r => r.json().then(data => ({ ok: r.ok, data })))
  .then(({ ok, data }) => {
    if (!ok) { alert('Error: ' + (data.detail || JSON.stringify(data))); return; }
    closeUploadModal();
    loadReels();
  })
  .catch(err => alert('Error de conexión: ' + err))
  .finally(() => { btn.disabled = false; btn.textContent = 'Guardar'; });
});

function getCSRF() {
  const c = document.cookie.split(';').find(c => c.trim().startsWith('csrftoken='));
  return c ? c.split('=')[1] : '';
}
</script>
{% endblock %}
