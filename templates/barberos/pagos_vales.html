{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
  <link rel="icon" type="image/x-icon" href="{% static 'images/favicon.ico' %}">
  <link rel="icon" type="image/png" sizes="512x512" href="{% static 'images/favicon30.png' %}">
  <link rel="apple-touch-icon" href="{% static 'images/favicon30.png' %}">

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pagos y Vales | Área 30</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            gold: { DEFAULT: '#D4AF37', dark: '#b39129', light: '#f3d97f' },
            jet: { DEFAULT: '#0A0A0A', card: '#111111', lighter: '#1a1a1a' },
            smoke: '#F5F5F5'
          },
          fontFamily: {
            sans: ['Montserrat', 'sans-serif'],
            serif: ['Playfair Display', 'serif'],
          }
        }
      }
    }
  </script>
</head>

<body class="bg-jet text-smoke font-sans antialiased min-h-screen">

  <!-- Navbar -->
  <nav class="sticky top-0 z-40 bg-jet border-b border-gold/20 flex items-center justify-between px-4 py-4">
    <div class="flex items-center gap-3">
      <a href="{% url 'barbers_pages:dashboard_barbero' %}" class="text-gold/60 hover:text-gold transition-colors" title="Volver a Mi Agenda">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
      </a>
      <div>
        <h1 class="text-lg font-serif font-bold text-white tracking-wide">Pagos y Vales</h1>
        <p class="text-[0.65rem] tracking-[0.2em] uppercase text-gold/80">Acumulado de barberos</p>
      </div>
    </div>
    <form method="post" action="{% url 'barbers_pages:barbero_logout' %}" class="inline">
      {% csrf_token %}
      <button type="submit" class="text-xs uppercase tracking-widest text-smoke/50 hover:text-gold transition-colors">Salir</button>
    </form>
  </nav>

  <main class="max-w-2xl mx-auto px-4 py-6">
    <div class="flex items-baseline justify-between mb-4">
      <p class="text-[0.65rem] text-smoke/40 leading-snug">Comisiones + propinas de ventas aprobadas.<br>Los vales se descuentan del acumulado.</p>
      <button onclick="fetchBarberPayments()" class="text-[0.65rem] uppercase tracking-widest text-gold/70 hover:text-gold flex items-center gap-1.5 shrink-0">
        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
        Actualizar
      </button>
    </div>

    <div id="barber-payments-container" class="grid grid-cols-1 sm:grid-cols-2 gap-3">
      <div class="text-center text-smoke/40 py-12 text-sm">Cargando pagos…</div>
    </div>
  </main>

  <!-- Modal: Vale / Adelanto -->
  <div id="cf-modal-advance" class="fixed inset-0 z-50 hidden">
    <div class="absolute inset-0 bg-black/80" onclick="closeAdvanceModal()"></div>
    <div class="absolute inset-x-4 top-1/2 -translate-y-1/2 max-w-md mx-auto">
      <div class="bg-jet-card border border-amber-500/30 rounded-md shadow-2xl">
        <div class="px-5 py-3 border-b border-white/5 flex items-center justify-between">
          <h3 class="text-sm font-bold text-white tracking-widest uppercase">Vale / Adelanto</h3>
          <button onclick="closeAdvanceModal()" class="text-smoke/40 hover:text-white">✕</button>
        </div>
        <div class="p-5 space-y-4">
          <div class="text-xs text-smoke/70">Préstamo a <strong class="text-white" id="cf-advance-barber-name"></strong>. Se descuenta de su acumulado de la quincena.</div>
          <div class="text-[0.7rem] text-smoke/50">Saldo disponible: <strong class="text-gold" id="cf-advance-available"></strong></div>
          <div>
            <label class="block text-[0.65rem] uppercase tracking-widest text-smoke/60 mb-2">Monto del vale</label>
            <input type="number" id="cf-advance-amount" min="1" step="1000" placeholder="0" class="w-full bg-jet border border-white/10 text-white rounded px-3 py-3 focus:border-amber-400 outline-none">
          </div>
          <div>
            <label class="block text-[0.65rem] uppercase tracking-widest text-smoke/60 mb-2">Motivo (opcional)</label>
            <input type="text" id="cf-advance-reason" maxlength="255" placeholder="Ej: adelanto personal" class="w-full bg-jet border border-white/10 text-white rounded px-3 py-3 focus:border-amber-400 outline-none">
          </div>
          <div id="cf-advance-error" class="hidden p-2 bg-red-500/20 border border-red-500/40 text-red-400 text-xs rounded"></div>
        </div>
        <div class="px-5 pb-4 flex gap-2 justify-end">
          <button onclick="closeAdvanceModal()" class="px-4 py-2 text-xs uppercase tracking-widest text-smoke border border-white/10 rounded">Cancelar</button>
          <button id="cf-btn-confirm-advance" onclick="submitAdvance()" class="px-4 py-2 bg-amber-600 hover:bg-amber-500 text-white text-xs font-bold uppercase tracking-widest rounded">Registrar vale</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    const CSRF = '{{ csrf_token }}';
    const fmt = n => '$' + (Number(n) || 0).toLocaleString('es-CO');
    const escH = s => String(s == null ? '' : s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

    function fetchBarberPayments() {
      const container = document.getElementById('barber-payments-container');
      container.innerHTML = '<div class="text-center text-smoke/40 py-12 text-sm sm:col-span-2">Cargando pagos…</div>';
      fetch('/api/admin/cashflow/barber-payments/', { headers: { 'X-CSRFToken': CSRF } })
        .then(r => r.json())
        .then(data => {
          if (!data.payments || data.payments.length === 0) {
            container.innerHTML = `
              <div class="sm:col-span-2 text-center py-10 border border-emerald-500/30 rounded-md text-emerald-300/90 text-sm">
                ✓ Todo al día — sin saldos pendientes.
              </div>`;
            return;
          }
          container.innerHTML = data.payments.map(p => {
            const hasAdvances = (p.total_advances || 0) > 0;
            const safeName = (p.barber_name || '').replace(/'/g, "\\'");
            return `
            <div class="bg-jet-card border border-gold/20 rounded-md p-4 flex flex-col">
              <div class="flex items-baseline justify-between mb-3">
                <h3 class="text-white font-serif text-base">${escH(p.barber_name)}</h3>
                <span class="text-gold font-bold text-base">${fmt(p.net_payable)}</span>
              </div>
              <div class="space-y-1 text-[0.7rem]">
                <div class="flex justify-between"><span class="text-smoke/50">Comisiones</span><span class="text-white">${fmt(p.total_commissions)}</span></div>
                <div class="flex justify-between"><span class="text-smoke/50">Propinas</span><span class="text-emerald-400">+${fmt(p.total_tips)}</span></div>
                <div class="flex justify-between border-t border-white/5 pt-1"><span class="text-smoke/50">Acumulado</span><span class="text-white">${fmt(p.total_earnings)}</span></div>
                ${hasAdvances ? `
                <div class="flex justify-between"><span class="text-amber-400/80">Vales / adelantos</span><span class="text-amber-400">-${fmt(p.total_advances)}</span></div>
                <div class="flex justify-between border-t border-white/10 pt-1 font-bold"><span class="text-gold uppercase tracking-widest text-[0.6rem]">Neto a pagar</span><span class="text-gold">${fmt(p.net_payable)}</span></div>
                ` : ''}
              </div>
              ${p.history && p.history.length > 0 ? `
                <details class="mt-2">
                  <summary class="text-[0.6rem] text-smoke/40 uppercase tracking-widest cursor-pointer hover:text-white">Historial diario (${p.history.length})</summary>
                  <div class="mt-2 space-y-1 max-h-32 overflow-y-auto text-[0.65rem]">
                    ${p.history.map(h => `<div class="flex justify-between bg-white/[0.02] p-1.5 rounded"><span class="text-smoke/60">${h.date}</span><span class="text-gold">${fmt(h.total)}</span></div>`).join('')}
                  </div>
                </details>
              ` : ''}
              ${hasAdvances ? `
                <details class="mt-2" open>
                  <summary class="text-[0.6rem] text-amber-400/60 uppercase tracking-widest cursor-pointer hover:text-amber-400">Vales / adelantos (${p.advances.length})</summary>
                  <div class="mt-2 space-y-1 max-h-40 overflow-y-auto text-[0.65rem]">
                    ${p.advances.map(a => `
                      <div class="flex justify-between items-center bg-amber-500/[0.06] border border-amber-500/20 p-1.5 rounded gap-2">
                        <div class="min-w-0">
                          <div class="text-amber-300 font-medium">${fmt(a.amount)}</div>
                          <div class="text-smoke/40 text-[0.58rem] truncate">${a.date}${a.reason ? ' · ' + escH(a.reason) : ''} · ${escH(a.by)}</div>
                        </div>
                        <button onclick="deleteAdvance(${a.id})" class="text-red-400/60 hover:text-red-400 shrink-0 px-1 text-sm leading-none" title="Anular vale">✕</button>
                      </div>
                    `).join('')}
                  </div>
                </details>
              ` : ''}
              <div class="mt-auto pt-3 flex flex-wrap gap-2">
                <button onclick="openAdvanceModal(${p.barber_id}, '${safeName}', ${p.net_payable})"
                  class="flex-1 min-w-[7rem] py-2 bg-amber-600/15 border border-amber-500/40 text-amber-300 hover:bg-amber-600/30 font-bold tracking-wider text-[0.65rem] uppercase rounded transition-colors whitespace-nowrap">
                  Dar vale
                </button>
                <button onclick="payBarber(${p.barber_id}, '${safeName}', ${p.net_payable})"
                  class="flex-1 min-w-[7rem] py-2 bg-emerald-600 hover:bg-emerald-500 text-white font-bold tracking-wider text-[0.65rem] uppercase rounded transition-colors whitespace-nowrap">
                  Marcar pagado
                </button>
              </div>
            </div>
          `;}).join('');
        })
        .catch(() => {
          container.innerHTML = '<div class="sm:col-span-2 text-center text-red-400 py-12 text-sm">Error al cargar pagos.</div>';
        });
    }
    window.fetchBarberPayments = fetchBarberPayments;

    window.payBarber = function(barberId, barberName, netAmount) {
      if (!confirm(`Liquidar ${fmt(netAmount)} (neto, ya descontados los vales) a ${barberName}?`)) return;
      fetch(`/api/admin/cashflow/barber-payments/${barberId}/pay/`, {
        method: 'POST',
        headers: { 'X-CSRFToken': CSRF }
      })
      .then(r => r.json())
      .then(data => {
        if (data.ok) { alert(data.message); fetchBarberPayments(); }
        else { alert(data.error || 'Error.'); }
      })
      .catch(() => alert('Error de conexión.'));
    };

    let cfAdvanceBarberId = null;
    window.openAdvanceModal = function(barberId, barberName, available) {
      cfAdvanceBarberId = barberId;
      document.getElementById('cf-advance-barber-name').textContent = barberName;
      document.getElementById('cf-advance-available').textContent = fmt(available);
      document.getElementById('cf-advance-amount').value = '';
      document.getElementById('cf-advance-reason').value = '';
      const err = document.getElementById('cf-advance-error');
      err.classList.add('hidden'); err.textContent = '';
      document.getElementById('cf-modal-advance').classList.remove('hidden');
      setTimeout(() => document.getElementById('cf-advance-amount').focus(), 50);
    };
    window.closeAdvanceModal = function() {
      document.getElementById('cf-modal-advance').classList.add('hidden');
      cfAdvanceBarberId = null;
    };
    window.submitAdvance = function() {
      if (!cfAdvanceBarberId) return;
      const amount = parseInt(document.getElementById('cf-advance-amount').value, 10);
      const reason = document.getElementById('cf-advance-reason').value.trim();
      const errEl = document.getElementById('cf-advance-error');
      const btn = document.getElementById('cf-btn-confirm-advance');
      errEl.classList.add('hidden');
      if (!amount || amount <= 0) {
        errEl.textContent = 'Ingresa un monto válido.';
        errEl.classList.remove('hidden');
        return;
      }
      btn.disabled = true; btn.textContent = 'Registrando...';
      fetch(`/api/admin/cashflow/barber-payments/${cfAdvanceBarberId}/advance/`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'X-CSRFToken': CSRF },
        body: JSON.stringify({ amount, reason })
      })
      .then(r => r.json().then(d => ({ ok: r.ok, d })))
      .then(({ ok, d }) => {
        if (ok && d.ok) { closeAdvanceModal(); fetchBarberPayments(); }
        else { errEl.textContent = d.error || 'No se pudo registrar el vale.'; errEl.classList.remove('hidden'); }
      })
      .catch(() => { errEl.textContent = 'Error de conexión.'; errEl.classList.remove('hidden'); })
      .finally(() => { btn.disabled = false; btn.textContent = 'Registrar vale'; });
    };
    window.deleteAdvance = function(advanceId) {
      if (!confirm('¿Anular este vale/adelanto? El monto se devuelve al acumulado del barbero.')) return;
      fetch(`/api/admin/cashflow/barber-payments/advance/${advanceId}/`, {
        method: 'DELETE',
        headers: { 'X-CSRFToken': CSRF }
      })
      .then(r => r.json())
      .then(data => {
        if (data.ok) { fetchBarberPayments(); }
        else { alert(data.error || 'No se pudo anular el vale.'); }
      })
      .catch(() => alert('Error de conexión.'));
    };

    // Init
    fetchBarberPayments();
  </script>
</body>
</html>
